name: Release Android .so (gomobile)

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Release
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26.x"
          cache-dependency-path: go.sum

      - name: Install gomobile + NDK
        env:
          GOTOOLCHAIN: go1.26.4
        run: |
          go get -tool golang.org/x/mobile/cmd/gobind
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init
          curl -fsSL -o /tmp/ndk.zip https://dl.google.com/android/repository/android-ndk-r27-linux.zip
          unzip -q /tmp/ndk.zip -d /opt
          echo "ANDROID_NDK_HOME=/opt/android-ndk-r27" >> $GITHUB_ENV

      - name: Build .aar
        env:
          GOTOOLCHAIN: go1.26.4
          ANDROID_NDK_HOME: /opt/android-ndk-r27
        run: |
          gomobile bind \
            -target=android/arm64 \
            -androidapi 26 \
            -v \
            -o openlistbridge.aar \
            -tags glebarez \
            ./bridge/openlistbridge/
          ls -lh openlistbridge.aar

      - name: Build CLI
        run: |
          export GOOS=android GOARCH=arm64 CGO_ENABLED=0
          go build -ldflags="-s -w" -tags glebarez -o openlist-cli.arm64 ./bridge/cmd/debug/

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "${{ github.ref_name }}" -y --repo linuxwff789/openlist-android 2>/dev/null || true
          gh release create "${{ github.ref_name }}" \
            --title "OpenList Bridge ${{ github.ref_name }}" \
            --notes "## OpenList Android Bridge ${{ github.ref_name }}

            ### Files
            - \`openlistbridge.aar\` — Gomobile AAR (Gradle dependency, contains libgojni.so + Java bindings)
            - \`openlist-cli.arm64\` — Termux debug CLI

            ### Usage
            Add to \`build.gradle.kts\`:
            \`\`\`kotlin
            implementation(files("libs/openlistbridge.aar"))
            \`\`\`

            ### Supported drivers
            - WebDAV
            - AliyunDrive Open (阿里云盘)

            ### Build
            Built with gomobile bind (Go 1.26.x)" \
            openlistbridge.aar openlist-cli.arm64
