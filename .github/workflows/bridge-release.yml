name: Release Android .so

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Release
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26.4"
          cache-dependency-path: go.sum

      - name: Install NDK
        run: |
          curl -fsSL -o /tmp/ndk.zip https://dl.google.com/android/repository/android-ndk-r27-linux.zip
          unzip -q /tmp/ndk.zip -d /opt
          echo "ANDROID_NDK_HOME=/opt/android-ndk-r27" >> $GITHUB_ENV

      - name: Build .so
        run: |
          NDK=$ANDROID_NDK_HOME TC=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          CC=$TC/bin/aarch64-linux-android21-clang
          export GOOS=android GOARCH=arm64 CGO_ENABLED=1 CC=$CC
          go build -buildmode=c-shared -ldflags="-s -w -extldflags=-Wl,-soname,libopenlist.so" \
            -tags glebarez -o libopenlist.so ./bridge/

      - name: Build CLI
        run: |
          export GOOS=android GOARCH=arm64 CGO_ENABLED=0
          go build -ldflags="-s -w" -tags glebarez -o openlist-cli.arm64 ./bridge/cmd/debug/

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "OpenList Bridge ${{ github.ref_name }}" \
            --notes "## OpenList Android Bridge ${{ github.ref_name }}

            ### Files
            - \`libopenlist.so\` — JNI native library (place in \`jniLibs/arm64-v8a/\`)
            - \`openlist-cli.arm64\` — Termux debug CLI
            - \`OpenListBridge.kt\` — Kotlin wrapper (add to your project)

            ### Supported drivers
            - WebDAV
            - 189Cloud (天翼云)
            - AliyunDrive Open (阿里云盘)" \
            libopenlist.so openlist-cli.arm64 bridge/OpenListBridge.kt
